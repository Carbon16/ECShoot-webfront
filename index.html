<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <script>
        window.onload = function() {
            fetch('http://localhost')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('content').innerHTML = data;
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        };
    </script>
</head>
<body>
    <div id="content"></div>
</body>
</html>
